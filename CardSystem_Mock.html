    <div className="stars-row">
      {Array.from({ length: max }).map((_, i) => (
        <div key={i} className={`star ${i < count ? 'star-filled' : 'star-empty'}`} />
      ))}
    </div>
  );
}

function TruePotentialBar({ value, isRevealed }) {
  const pct = (value / 10) * 100;
  const color = value >= 7 ? '#27ae60' : value >= 5 ? '#d4a843' : '#c0392b';
  const label = value >= 8 ? 'Pro Bowl upside' : value >= 6 ? 'Solid starter' : value >= 4 ? 'Depth piece' : 'Likely bust';
  return (
    <div className="tp-section">
      <div className="tp-label">True Potential (Internal Eval)</div>
      <div className="tp-bar-track">
        <div className="tp-bar-fill" style={{ width: isRevealed ? `${pct}%` : '0%', background: color }} />
      </div>
      <div className="tp-readout">{value} / 10 — {label}</div>
    </div>
  );
}

function CardBack({ name, position, riskType, riskDetail, potentialValue, narration, isFlipped }) {
  return (
    <div className="card-face card-back">
      <div className="back-eyebrow">⚠ Intelligence Report — Confidential</div>
      <div className="back-name">{name} · {position}</div>
      <div className="risk-tag-label">Risk category:</div>
      <div className="risk-type-badge">{riskType === "None" ? "No Hidden Risk" : riskType}</div>
      <div className="risk-detail">{riskDetail}</div>
      <div className="back-divider" />
      <TruePotentialBar value={potentialValue} isRevealed={isFlipped} />
      <div className="narration-box" style={{ marginTop: 12 }}>
        <div className="narration-eyebrow">GM Narration</div>
        <div className="narration-text">"{narration}"</div>
      </div>
      <div className="back-flip-hint" style={{ marginTop: 12 }}>▲ Click to flip back ▲</div>
    </div>
  );
}


/* ═══════════════════════════════════════════
   SECTION 3: PROSPECT CARD
═══════════════════════════════════════════ */
function ProspectCard({ card, isFlipped, onFlip }) {
  const v = card.visible;
  const h = card.hidden;
  return (
    <div className="card-scene" onClick={onFlip}>
      <div className={`card-inner ${isFlipped ? 'flipped' : ''}`}>
        <div className="card-face card-front">
          <div className="card-header">
            <div className="card-pos-badge">{v.position}</div>
            <div className="card-rank">#{v.overallRank} Overall · #{v.positionRank} {v.position}</div>
            <div className="card-name">{v.name}</div>
            <div className="card-sub">{v.college}</div>
            <div className="consensus-badge">{v.bigBoardConsensus}</div>
          </div>
          <div className="card-physical">
            <div className="phys-item"><span className="phys-label">Ht</span><span className="phys-val">{v.physical.height}</span></div>
            <div className="phys-item"><span className="phys-label">Wt</span><span className="phys-val">{v.physical.weight}</span></div>
            <div className="phys-item"><span className="phys-label">40 yd</span><span className="phys-val">{v.physical.fortyYard}</span></div>
          </div>
          <div className="card-stats">
            {v.stats.map((s, i) => <div className="stat-row" key={i}><span className="stat-label">{s.label}</span><span className="stat-val">{s.value}</span></div>)}
          </div>
          <div className="card-scout">
            <div className="scout-label">Scout Report</div>
            <div className="scout-text">{v.scoutReport}</div>
          </div>
          <div className="card-footer">
            <div className="footer-row">
              <div>
                <div style={{ fontSize: 9, color: '#4a5a72', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 5, fontFamily: "'Barlow Condensed',sans-serif" }}>Potential</div>
                <Stars count={v.potentialRating} />
              </div>
              <div className="potential-note">{v.potentialNote}</div>
            </div>
          </div>
          <div className="flip-hint">▼ Click to reveal hidden risk ▼</div>
        </div>
        <CardBack name={v.name} position={v.position} riskType={h.riskType} riskDetail={h.riskDetail} potentialValue={h.truePotential} narration={h.revealNarration} isFlipped={isFlipped} />
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════
   SECTION 4: FREE AGENT CARD
═══════════════════════════════════════════ */
function FreeAgentCard({ card, isFlipped, onFlip }) {
  const v = card.visible;
  const h = card.hidden;
  return (
    <div className="card-scene fa" onClick={onFlip}>
      <div className={`card-inner ${isFlipped ? 'flipped' : ''}`}>
        <div className="card-face card-front">
          <div className="card-header green">
            <div className="card-pos-badge green">{v.position}</div>
            <div className="card-rank">Age {v.age} · {v.experience}</div>
            <div className="card-name">{v.name}</div>
            <div className="card-sub">Prev: {v.previousTeam}</div>
          </div>
          <div className="card-physical">
            <div className="phys-item"><span className="phys-label">Ht</span><span className="phys-val">{v.physical.height}</span></div>
            <div className="phys-item"><span className="phys-label">Wt</span><span className="phys-val">{v.physical.weight}</span></div>
            <div className="phys-item"><span className="phys-label">Market</span><span className={`market-badge market-${v.marketValue}`}>{v.marketValue}</span></div>
          </div>
          <div className="card-stats">
            {v.stats.map((s, i) => <div className="stat-row" key={i}><span className="stat-label">{s.label}</span><span className="stat-val">{s.value}</span></div>)}
          </div>
          <div className="card-scout">
            <div className="scout-label">Scout Report</div>
            <div className="scout-text">{v.scoutReport}</div>
          </div>
          <div className="card-footer">
            <div style={{ marginBottom: 8 }}>
              <div className="fa-ask-label">Agent Asking</div>
              <div className="fa-ask">{v.agentAsk}</div>
            </div>
            <div className="mini-bars">
              <div className="mini-bar-row">
                <span className="mini-bar-label">Immediate Impact</span>
                <div className="mini-bar-track"><div className="mini-bar-fill" style={{ width: `${(v.immediateImpact/5)*100}%`, background: '#27ae60' }} /></div>
                <span style={{ fontSize: 11, color: '#8a9bb5', minWidth: 14, textAlign: 'right', fontFamily: "'Barlow Condensed',sans-serif" }}>{v.immediateImpact}</span>
              </div>
              <div className="mini-bar-row">
                <span className="mini-bar-label">Longevity</span>
                <div className="mini-bar-track"><div className="mini-bar-fill" style={{ width: `${(v.longevity/5)*100}%`, background: '#d4a843' }} /></div>
                <span style={{ fontSize: 11, color: '#8a9bb5', minWidth: 14, textAlign: 'right', fontFamily: "'Barlow Condensed',sans-serif" }}>{v.longevity}</span>
              </div>
            </div>
          </div>
          <div className="flip-hint">▼ Click to reveal hidden risk ▼</div>
        </div>
        <CardBack name={v.name} position={v.position} riskType={h.riskType} riskDetail={h.riskDetail} potentialValue={h.trueValue} narration={h.revealNarration} isFlipped={isFlipped} />
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════
   SECTION 5: INHERITED ROSTER CARD
   No flip — these are known quantities.
═══════════════════════════════════════════ */
function InheritedCard({ card }) {
  const statusClass = `status-${card.status.replace(' ', '\\ ')}`;
  return (
    <div className="card-scene inherited">
      <div className="card-inner">
        <div className="card-face card-front">
          <div className="card-header red">
            <div className="card-pos-badge red">{card.position}</div>
            <div className="card-rank">Inherited · Age {card.age} · ${(card.salary/1000000).toFixed(1)}M / yr</div>
            <div className="card-name">{card.name}</div>
            <div className={`inherited-status ${statusClass}`}>{card.status}</div>
          </div>
          <div className="card-stats" style={{ flex: 1 }}>
            <div className="scout-label" style={{ padding: '8px 0 6px' }}>Situation</div>
            <div className="scout-text" style={{ fontSize: 12, marginBottom: 10 }}>{card.description}</div>
            {card.stats.map((s, i) => <div className="stat-row" key={i}><span className="stat-label">{s.label}</span><span className="stat-val">{s.value}</span></div>)}
          </div>
          <div className="warning-box">
            <div className="warning-label">⚠ GM Warning</div>
            {card.warning}
          </div>
        </div>
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════
   SECTION 6: EVENT CARD
═══════════════════════════════════════════ */
function EventCard({ card, selectedOption, onSelect }) {
  return (
    <div className="event-card">
      <div className="event-header">
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
          <div className="event-title">{card.title}</div>
        </div>
        <span className={`urgency-badge urgency-${card.urgency}`}>{card.urgency} URGENCY</span>
      </div>
      <div className="event-desc">{card.description}</div>
      <div className="event-options">
        <div className="scout-label">Your options:</div>
        {card.options.map(opt => (
          <div
            key={opt.id}
            className={`option-btn ${selectedOption === opt.id ? 'selected' : ''}`}
            onClick={() => onSelect(card.id, opt.id)}
          >
            <div className="option-label">{opt.id}. {opt.label}</div>
            <div className="option-consequence">{opt.consequence}</div>
            <div className="option-meta">
              <span className={`risk-pill risk-${opt.riskLevel}`}>{opt.riskLevel} risk</span>
              {opt.capImpact !== 0 && (
                <span className="cap-pill">
                  {opt.capImpact < 0 ? `-$${Math.abs(opt.capImpact/1000000).toFixed(1)}M cap` : `+$${(opt.capImpact/1000000).toFixed(1)}M cap`}
                </span>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════
   SECTION 7: MAIN APP
═══════════════════════════════════════════ */
const POSITIONS = ["ALL", "QB", "WR", "OL", "DEF"];

function App() {
  const [activeTab, setActiveTab] = useState("inherited");
  const [posFilter, setPosFilter] = useState("ALL");
  const [displayedCards, setDisplayedCards] = useState([]);
  const [flippedSet, setFlippedSet] = useState(new Set());
  const [eventSelections, setEventSelections] = useState({});
  const [events, setEvents] = useState([]);

  const loadCards = () => {
    setFlippedSet(new Set());
    if (activeTab === "inherited") {
      setDisplayedCards(INHERITED_ROSTER);
    } else if (activeTab === "prospects") {
      setDisplayedCards(getProspects(posFilter));
    } else if (activeTab === "freeagents") {
      setDisplayedCards(getFreeAgents(posFilter));
    } else if (activeTab === "events") {
      const drawn = getEvents();
      setEvents(drawn);
      setEventSelections({});
    }
  };

  const toggleFlip = (id) => {
    setFlippedSet(prev => {
      const s = new Set(prev);
      s.has(id) ? s.delete(id) : s.add(id);
      return s;
    });
  };

  const selectOption = (eventId, optionId) => {
    setEventSelections(prev => ({ ...prev, [eventId]: optionId }));
  };

  const tabStyle = (tab) => ({
    fontFamily: "'Barlow Condensed', sans-serif",
    fontSize: 12, fontWeight: 600,
    letterSpacing: '0.1em', textTransform: 'uppercase',
    padding: '8px 16px', cursor: 'pointer',
    border: 'none', borderRadius: 6,
    background: activeTab === tab ? '#d4a843' : 'transparent',
    color: activeTab === tab ? '#0a0f1a' : '#8a9bb5',
    transition: 'all 0.15s'
  });

  return (
    <div>
      <header className="app-header">
        <div className="app-title">NFL GM War Room</div>
        <div className="app-subtitle">Module 1 — Card System</div>
        <div className="mock-badge">● Mock Data Mode</div>
      </header>

      <div className="info-box">
        <strong>Mock mode active</strong> — all cards draw from the built-in data library. No API calls, no cost. 
        Switch <strong>USE_MOCK = false</strong> in the code when ready to use live Claude generation.
      </div>

      {/* Tab navigation */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 20, flexWrap: 'wrap' }}>
        {[
          { id: 'inherited', label: '🏚 Inherited Roster' },
          { id: 'prospects', label: '🎯 Draft Prospects' },
          { id: 'freeagents', label: '✍️ Free Agents' },
          { id: 'events', label: '⚡ Season Events' },
        ].map(t => (
          <button key={t.id} style={tabStyle(t.id)} onClick={() => { setActiveTab(t.id); setDisplayedCards([]); setEvents([]); }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Controls */}
      <div className="controls">
        {(activeTab === 'prospects' || activeTab === 'freeagents') && (
          <div className="control-group">
            <label>Position</label>
            <select value={posFilter} onChange={e => setPosFilter(e.target.value)}>
              {POSITIONS.map(p => <option key={p} value={p}>{p === 'ALL' ? 'All Positions' : p}</option>)}
            </select>
          </div>
        )}
        <div className="controls-right">
          {displayedCards.length > 0 && activeTab !== 'inherited' && activeTab !== 'events' && (
            <button className="btn btn-danger" onClick={() => { setDisplayedCards([]); setFlippedSet(new Set()); }}>Clear</button>
          )}
          <button className="btn btn-gold" onClick={loadCards}>
            {activeTab === 'inherited' ? 'Show Inherited Roster' :
             activeTab === 'prospects' ? 'Draw Prospects' :
             activeTab === 'freeagents' ? 'Draw Free Agents' :
             'Draw Season Events'}
          </button>
        </div>
      </div>

      {/* Inherited Roster */}
      {activeTab === 'inherited' && displayedCards.length > 0 && (
        <>
          <div className="section-header">
            <div className="section-title">What the previous GM left you</div>
            <div className="section-line" />
          </div>
          <div className="card-grid">
            {displayedCards.map(card => <InheritedCard key={card.id} card={card} />)}
          </div>
        </>
      )}

      {/* Prospect Cards */}
      {activeTab === 'prospects' && displayedCards.length > 0 && (
        <>
          <div className="section-header">
            <div className="section-title">Draft Prospects — Click to reveal hidden risk</div>
            <div className="section-line" />
          </div>
          <div className="card-grid">
            {displayedCards.map(card => (
              <div key={card.id} style={{ position: 'relative' }}>
                <button className="card-remove" onClick={() => setDisplayedCards(prev => prev.filter(c => c.id !== card.id))}>✕</button>
                <ProspectCard card={card} isFlipped={flippedSet.has(card.id)} onFlip={() => toggleFlip(card.id)} />
              </div>
            ))}
          </div>
        </>
      )}

      {/* Free Agent Cards */}
      {activeTab === 'freeagents' && displayedCards.length > 0 && (
        <>
          <div className="section-header">
            <div className="section-title">Free Agent Market — Click to reveal hidden risk</div>
            <div className="section-line" />
          </div>
          <div className="card-grid">
            {displayedCards.map(card => (
              <div key={card.id} style={{ position: 'relative' }}>
                <button className="card-remove" onClick={() => setDisplayedCards(prev => prev.filter(c => c.id !== card.id))}>✕</button>
                <FreeAgentCard card={card} isFlipped={flippedSet.has(card.id)} onFlip={() => toggleFlip(card.id)} />
              </div>
            ))}
          </div>
        </>
      )}

      {/* Event Cards */}
      {activeTab === 'events' && events.length > 0 && (
        <>
          <div className="section-header">
            <div className="section-title">Season Events — Choose your response</div>
            <div className="section-line" />
          </div>
          <div className="card-grid">
            {events.map(ev => (
              <EventCard key={ev.id} card={ev} selectedOption={eventSelections[ev.id]} onSelect={selectOption} />
            ))}
          </div>
          {Object.keys(eventSelections).length > 0 && (
            <div className="info-box" style={{ marginTop: 8 }}>
              <strong>Decisions logged:</strong> {Object.keys(eventSelections).length} of {events.length} events resolved. 
              These choices would feed into the Module 5 GM Report.
            </div>
          )}
        </>
      )}

      {/* Empty state */}
      {displayedCards.length === 0 && events.length === 0 && (
        <div className="empty-state">
          <div className="empty-icon">
            {activeTab === 'inherited' ? '🏚' : activeTab === 'prospects' ? '🎯' : activeTab === 'freeagents' ? '✍️' : '⚡'}
          </div>
          <div className="empty-title">
            {activeTab === 'inherited' ? 'See what you inherited' :
             activeTab === 'prospects' ? 'Pull from the draft board' :
             activeTab === 'freeagents' ? 'Check the free agent market' :
             'Draw season events'}
          </div>
          <div className="empty-sub">Click the button above to load cards</div>
        </div>
      )}

      <div className="app-footer">
        <span>Module 1 of 5</span>
        <span>Mock mode: {USE_MOCK ? 'ON' : 'OFF'}</span>
        <span>Cards flipped: {flippedSet.size}</span>
        <span>Decisions made: {Object.keys(eventSelections).length}</span>
        <span>No API calls used</span>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
