<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useRef } = React;

/* ═══════════════════════════════════════════
   SECTION 1: API UTILITIES
   These functions handle all communication
   with the Claude API.
═══════════════════════════════════════════ */

/**
 * callClaude — sends a prompt to the Claude API and returns parsed JSON.
 * Strips any markdown code fences Claude might accidentally include.
 * Throws an error if the API key is wrong or the response isn't valid JSON.
 */
async function callClaude(apiKey, prompt) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      // Required header for direct browser API calls
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!response.ok) {
    const errBody = await response.json().catch(() => ({}));
    const msg = errBody?.error?.message || `HTTP ${response.status}`;
    throw new Error(msg);
  }

  const data = await response.json();
  const rawText = data.content[0].text;

  // Strip markdown code fences if Claude included them
  const cleaned = rawText
    .replace(/^```json\s*/m, '')
    .replace(/^```\s*/m, '')
    .replace(/\s*```\s*$/m, '')
    .trim();

  return JSON.parse(cleaned);
}


/* ═══════════════════════════════════════════
   SECTION 2: CLAUDE PROMPTS
   These are the exact prompts sent to Claude
   to generate each card type. Matches the
   spec from the master instructions exactly.
═══════════════════════════════════════════ */

/**
 * buildProspectPrompt — generates a draft prospect card.
 * rankMin/rankMax set the Big Board range to vary across picks.
 */
function buildProspectPrompt(position, rankMin, rankMax) {
  return `You are an NFL draft scouting system generating a prospect card for a strategy game.

Generate ONE fictional NFL draft prospect with the following requirements:
- Position: ${position} (QB, WR, OL, or DE)
- Big Board Overall Rank: between ${rankMin} and ${rankMax}
- Draft class context: This is a strong draft year with several high-ceiling players.

Return ONLY a JSON object. No markdown, no explanation, no backticks.

JSON structure:
{
  "visible": {
    "name": "[fictional full name, sounds like a real American athlete]",
    "position": "${position}",
    "college": "[real or fictional US university]",
    "overallRank": [integer between ${rankMin} and ${rankMax}],
    "positionRank": [integer, their rank among players at their position],
    "physical": {
      "height": "[realistic for position, format: 6'3\\"  ]",
      "weight": "[realistic for position, format: 218 lbs]",
      "fortyYard": "[realistic 40-yard dash, format: 4.71s]"
    },
    "stats": [
      { "label": "[stat name relevant to position]", "value": "[realistic college stat]" },
      { "label": "[stat name relevant to position]", "value": "[realistic college stat]" },
      { "label": "[stat name relevant to position]", "value": "[realistic college stat]" }
    ],
    "scoutReport": "[3 sentences. Tone: real NFL scout language. Structure: one strength, one doubt, one unresolved question. Make it genuinely ambiguous — neither clearly good nor clearly bad. Do NOT give away the hidden risk.]",
    "potentialRating": [integer 1-5],
    "potentialNote": "[one sentence justifying the rating]",
    "bigBoardConsensus": "[one phrase: 'consensus top-5 pick' / 'late first round' / 'early second round' / 'sleeper pick' etc]"
  },
  "hidden": {
    "riskType": "[ONE of: Agent Issues / Injury History / Locker Room Attitude / Motivation Concerns / Family Pressure / Financial Distractions]",
    "riskDetail": "[1-2 sentences. Specific and concrete. Not vague. This is what the player discovers AFTER drafting.]",
    "truePotential": [integer 1-10, CAN differ significantly from potentialRating multiplied by 2],
    "revealNarration": "[1 sentence. Dramatic. Present tense. From the GM's perspective. The moment of discovery.]"
  }
}

Rules:
1. Scout report must be genuinely ambiguous — a good player can have a 3-star rating, a risky player can have a 4-star rating
2. truePotential can be HIGHER than surface rating (underrated sleeper) or LOWER (overrated bust)
3. Vary the riskType — do not always use Injury History
4. Stats must be realistic for the position and college level
5. Name should sound like a real NFL player name, not a fantasy character`;
}

/**
 * buildFreeAgentPrompt — generates a veteran free agent card.
 * capRemaining is passed so Claude can set a realistic asking price.
 */
function buildFreeAgentPrompt(position, capRemaining) {
  return `You are an NFL front office system generating a free agent card for a GM strategy game.

Generate ONE fictional NFL free agent available for signing.
- Position needed: ${position}
- Team's remaining cap space: $${(capRemaining / 1000000).toFixed(1)}M

The agent's asking price must be within cap space or slightly over (to create tension).

Return ONLY a JSON object. No markdown, no explanation, no backticks.

JSON structure:
{
  "visible": {
    "name": "[fictional full name]",
    "position": "${position}",
    "age": [integer, realistic veteran age: 28-35],
    "experience": "[X seasons]",
    "previousTeam": "[fictional NFL team name]",
    "physical": {
      "height": "[realistic]",
      "weight": "[realistic]"
    },
    "stats": [
      { "label": "[relevant stat for position]", "value": "[value]" },
      { "label": "[relevant stat for position]", "value": "[value]" },
      { "label": "[relevant stat for position]", "value": "[value]" }
    ],
    "agentAsk": "$[X]M / [Y] years",
    "marketValue": "[Low / Medium / High]",
    "scoutReport": "[2-3 sentences. Honest about age-related decline but fair about current ability. Mention one specific strength and one specific concern.]",
    "immediateImpact": [integer 1-5],
    "longevity": [integer 1-5, lower for older players]
  },
  "hidden": {
    "riskType": "[ONE of: Injury History / Contract Demands / Attitude Problems / Physical Decline / Personal Issues]",
    "riskDetail": "[1-2 sentences. Specific. The information the team's medical or scouting staff found but didn't make public.]",
    "trueValue": [integer 1-10],
    "revealNarration": "[1 sentence. The GM discovers this after signing. Present tense.]"
  }
}`;
}


/* ═══════════════════════════════════════════
   SECTION 3: SMALL UI COMPONENTS

/** Stars — renders 1-5 gold/empty blocks for potential rating */
function Stars({ count, max = 5 }) {
  return (
    <div className="stars-row" aria-label={`${count} out of ${max} stars`}>
      {Array.from({ length: max }).map((_, i) => (
        <div key={i} className={`star ${i < count ? 'star-filled' : 'star-empty'}`} />
      ))}
    </div>
  );
}

/** TruePotentialBar — animating bar that reveals after flip */
function TruePotentialBar({ value, isRevealed }) {
  const pct = (value / 10) * 100;
  const color =
    value >= 7 ? '#27ae60' :
    value >= 5 ? '#d4a843' :
    '#c0392b';
  const label =
    value >= 8 ? 'Pro Bowl upside' :
    value >= 6 ? 'Solid starter' :
    value >= 4 ? 'Depth piece' : 'Likely bust';

  return (
    <div className="tp-section">
      <div className="tp-label">True Potential (Internal Eval)</div>
      <div className="tp-bar-track">
        <div
          className="tp-bar-fill"
          style={{
            width: isRevealed ? `${pct}%` : '0%',
            background: color
          }}
        />
      </div>
      <div className="tp-readout">{value} / 10 — {label}</div>
    </div>
  );
}

function CardError({ message, onRetry }) {
  return (
    <div className={`card-placeholder card-error-state`}>
      <div style={{ fontSize: 28, marginBottom: 4 }}>⚠</div>
      <div className="error-label">{message}</div>

        Retry

/* ═══════════════════════════════════════════
   SECTION 7: API KEY GATE
   First screen — player enters their key
   before entering the war room.
═══════════════════════════════════════════ */
function ApiKeyGate({ onSubmit }) {
  const [key, setKey] = useState('');

  const handleSubmit = () => {
    if (key.trim().startsWith('sk-')) onSubmit(key.trim());
  };

  return (
    <div className="gate">
      <div className="gate-eyebrow">Module 1 — Card System</div>
      <h1>NFL GM War Room</h1>
      <p>
        Enter your Anthropic API key to generate live player cards.
        Every card is uniquely created by Claude — no two runs are the same.
      </p>
      <p className="gate-note">
        Your key is used only in this browser session and sent directly to the Anthropic API.
        It is never stored, logged, or shared.
      </p>
      <input
        type="password"
        placeholder="sk-ant-api03-..."
        value={key}
        autoComplete="off"
        onChange={e => setKey(e.target.value)}
        onKeyDown={e => e.key === 'Enter' && handleSubmit()}
      />
      <button
        className="btn btn-gold btn-wide"
        disabled={!key.trim().startsWith('sk-')}
        onClick={handleSubmit}
      >
        Enter War Room →
      </button>
    </div>
  );
}


/* ═══════════════════════════════════════════
   SECTION 8: MAIN APP
   Orchestrates all state: which cards exist,
   which are flipped, loading/error status.
   This is what Module 2 (State Management)
   will eventually take over.
═══════════════════════════════════════════ */
const POSITIONS = ['QB', 'WR', 'OL', 'DE'];

function App() {
  // ── State ──
  const [apiKey, setApiKey] = useState('');
  const [cardMode, setCardMode] = useState('prospect');  // 'prospect' | 'freeagent'
  const [position, setPosition] = useState('QB');
  const [cards, setCards] = useState([]);           // array of card objects
  const [flippedSet, setFlippedSet] = useState(new Set());  // IDs of flipped cards
  const [activeGenerations, setActiveGenerations] = useState(0);
  const nextId = useRef(1);

  // ── Generate a new card ──
  const handleGenerate = useCallback(async () => {
    const id = nextId.current++;
    const mode = cardMode;  // capture current values
    const pos = position;

    // Add a loading placeholder immediately
    setCards(prev => [...prev, { id, status: 'loading', mode }]);
    setActiveGenerations(n => n + 1);

    try {
      let prompt;
      if (mode === 'prospect') {
        // Vary rank range so cards feel like different draft positions
        const rankMin = Math.floor(Math.random() * 18) + 1;
        prompt = buildProspectPrompt(pos, rankMin, rankMin + 10);
      } else {
        // Pass a realistic cap number so asking prices vary
        const capRemaining = 15000000 + Math.floor(Math.random() * 20000000);
        prompt = buildFreeAgentPrompt(pos, capRemaining);
      }

      const data = await callClaude(apiKey, prompt);

      setCards(prev => prev.map(c =>
        c.id === id
          ? { id, status: 'ok', mode, data }
          : c
      ));
    } catch (err) {
      setCards(prev => prev.map(c =>
        c.id === id
          ? { id, status: 'error', mode, message: err.message }
          : c
      ));
    }

    setActiveGenerations(n => n - 1);
  }, [apiKey, cardMode, position]);

  // ── Retry a failed card ──
  const handleRetry = useCallback(async (id, mode) => {
    setCards(prev => prev.map(c => c.id === id ? { ...c, status: 'loading' } : c));
    setActiveGenerations(n => n + 1);

    try {
      const pos = position;
      let prompt;
      if (mode === 'prospect') {
        const rankMin = Math.floor(Math.random() * 18) + 1;
        prompt = buildProspectPrompt(pos, rankMin, rankMin + 10);
      } else {
        prompt = buildFreeAgentPrompt(pos, 20000000);
      }
      const data = await callClaude(apiKey, prompt);
      setCards(prev => prev.map(c => c.id === id ? { id, status: 'ok', mode, data } : c));
    } catch (err) {
      setCards(prev => prev.map(c => c.id === id ? { id, status: 'error', mode, message: err.message } : c));
    }

    setActiveGenerations(n => n - 1);
  }, [apiKey, position]);

  // ── Remove a card ──
  const handleRemove = useCallback((id) => {
    setCards(prev => prev.filter(c => c.id !== id));
    setFlippedSet(prev => { const s = new Set(prev); s.delete(id); return s; });
  }, []);

  // ── Flip a card ──
  const handleFlip = useCallback((id) => {
    setFlippedSet(prev => {
      const s = new Set(prev);
      s.has(id) ? s.delete(id) : s.add(id);
      return s;
    });
  }, []);

  // ── Counts for footer ──
  const okCards = cards.filter(c => c.status === 'ok').length;
  const flippedCount = flippedSet.size;

  // ── Render ──
  if (!apiKey) {
    return <ApiKeyGate onSubmit={setApiKey} />;
  }

  return (
    <div>
      {/* Header */}
      <header className="app-header">
        <div className="app-title">NFL GM War Room</div>
        <div className="app-subtitle">Module 1 — Card System</div>
        <div className="key-badge">● API Connected</div>
      </header>

      {/* Info box */}
      <div className="info-box">
        <strong>How it works:</strong> Click "Generate Card" to call the Claude API and create a unique player. 
        Cards have a <strong>visible side</strong> (what scouts report) and a <strong>hidden risk</strong> (discovered after you commit). 
        Click any card to flip it and see what you're really dealing with.
      </div>

      {/* Controls */}
      <div className="controls">
        <div className="control-group">
          <label>Mode</label>
          <select value={cardMode} onChange={e => setCardMode(e.target.value)}>
            <option value="prospect">Draft Prospect</option>
            <option value="freeagent">Free Agent</option>
          </select>
        </div>
        <div className="control-group">
          <label>Position</label>
          <select value={position} onChange={e => setPosition(e.target.value)}>
            {POSITIONS.map(p => <option key={p} value={p}>{p}</option>)}
          </select>
        </div>
        <div className="controls-right">
          {cards.length > 0 && (
            <button
              className="btn btn-danger"
              onClick={() => { setCards([]); setFlippedSet(new Set()); }}
            >
              Clear All
            </button>
          )}
          <button
            className="btn btn-gold"
            onClick={handleGenerate}
            disabled={activeGenerations > 0}
          >
            {activeGenerations > 0 ? 'Generating...' : '+ Generate Card'}
          </button>
        </div>
      </div>

      {/* Empty state */}
      {cards.length === 0 && (
        <div className="empty-state">
          <div className="empty-icon">🏈</div>
          <div className="empty-title">War room is ready</div>
          <div className="empty-sub">Select a mode and position, then generate your first card</div>
        </div>
      )}

      {/* Card grid */}
      <div className="card-grid">
        {cards.map(card => (
          <div key={card.id} style={{ position: 'relative' }}>

            {/* Remove button (visible on all card states) */}
            <button
              className="card-remove"
              onClick={() => handleRemove(card.id)}
              aria-label="Remove card"
            >
              ✕
            </button>

            {/* Loading state */}
            {card.status === 'loading' && (
              <CardLoading isFreeAgent={card.mode === 'freeagent'} />
            )}

            {/* Error state */}
            {card.status === 'error' && (
              <CardError
                message={card.message}
                onRetry={() => handleRetry(card.id, card.mode)}
              />
            )}

            {/* Success state — render the appropriate card type */}
            {card.status === 'ok' && card.mode === 'prospect' && (
              <ProspectCard
                card={card.data}
                isFlipped={flippedSet.has(card.id)}
                onFlip={() => handleFlip(card.id)}
              />
            )}
            {card.status === 'ok' && card.mode === 'freeagent' && (
              <FreeAgentCard
                card={card.data}
                isFlipped={flippedSet.has(card.id)}
                onFlip={() => handleFlip(card.id)}
              />
            )}

          </div>
        ))}
      </div>

      {/* Footer */}
      <div className="app-footer">
        <span>Module 1 of 5</span>
        <span>Cards generated: {okCards}</span>
        <span>Risks revealed: {flippedCount}</span>
        <span>claude-sonnet-4-6</span>
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════
   SECTION 9: ENTRY POINT
   Mount the React app to the DOM.
═══════════════════════════════════════════ */
ReactDOM.render(<App />, document.getElementById('root'));

</script>
